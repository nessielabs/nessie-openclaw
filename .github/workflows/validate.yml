name: Validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  package:
    name: Plugin package
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Install dependencies
        run: npm ci

      - name: Validate package
        run: npm run validate

      - name: Smoke-test native runtime
        run: |
          node -e 'import("./index.js").then((m) => { if (!m.default || typeof m.default.register !== "function") throw new Error("missing plugin register"); })'

      - name: Dry-run package
        run: npm pack --dry-run
