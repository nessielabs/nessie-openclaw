name: Validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  package:
    name: Plugin package
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Validate package
        run: scripts/validate.sh
